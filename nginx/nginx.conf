worker_processes 1;

user nobody nogroup;
# 'user nobody nobody;' for systems with 'nobody' as a group instead
error_log /logs/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 64; # increase if you have lots of clients
  accept_mutex off; # set to 'on' if nginx worker_processes > 1
  use epoll; # to enable for Linux 2.6+
  # 'use kqueue;' to enable for FreeBSD, OSX
}

http {
  include mime.types;
  # fallback in case we can't determine a type
  default_type application/octet-stream;
  access_log /logs/nginx/fallback.log combined;
  sendfile on;

  upstream home_page {
    # fail_timeout=0 means we always retry an upstream even if it failed
    # to return a good HTTP response
    server home_page:8000 fail_timeout=0;
  }

  server {
    # if no Host match, close the connection to prevent host spoofing
    listen 80 default_server;
    return 444;
  }

  server {
    # use 'listen 80 deferred;' for Linux
    listen 80 deferred;
    client_max_body_size 1M;

    # set the correct host(s) for your site
    server_name dylan-shah.com www.dylan-shah.com dev.dylan-shah.com localhost;

    if ($http_x_forwarded_proto = "http") {
      return 301 https://$host$request_uri;
    }

    # Compress data to users
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/vnd. ms-fontobject application/x-font-ttf font/opentype font/woff2 image/svg+xml image/x-icon;
    gzip_vary on;
    gzip_proxied expired no-cache no-store private auth;
    gzip_comp_level 5;
    gzip_http_version 1.1;


    location /static/ {
      proxy_pass http://static_files/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
    location / {
      proxy_pass http://home_page;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
    location /favicon.ico {
      alias /favicon.ico;
    }
  }
}
